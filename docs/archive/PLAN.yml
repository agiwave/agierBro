#### 4.1 Tool 调用完整实现

**问题：**
- Tool 调用成功后跳转逻辑分散
- 错误处理不统一
- 缺少消息提示

**方案：**
```typescript
// 统一 Tool 执行结果处理
interface ToolResult {
  success: boolean
  data?: any
  actions?: Array<{
    type: 'navigate' | 'reload' | 'message' | 'close'
    target?: string
    message?: string
    level?: 'success' | 'error' | 'warning' | 'info'
  }>
}
```

**验收标准：**
- [ ] Tool 执行后自动处理 onSuccess/onError
- [ ] 支持多个动作顺序执行
- [ ] 统一的消息提示组件

#### 4.2 表单编辑功能

**问题：**
- ObjectForm 提交后只是 alert
- 没有调用实际的 Tool
- 缺少表单验证反馈

**方案：**
```json
{
  "_schema": {
    "tools": [
      {
        "name": "save",
        "label": "保存",
        "type": "submit",
        "metadata": {
          "http": { "method": "PUT", "url": "/api/orders/{id}" },
          "onSuccess": { "type": "navigate", "target": "/orders" },
          "onError": { "type": "message", "message": "保存失败", "level": "error" }
        }
      }
    ]
  }
}
```

**验收标准：**
- [ ] 表单提交调用 Tool
- [ ] 验证错误显示
- [ ] 成功后跳转/刷新

#### 4.3 错误处理机制

**问题：**
- API 失败无统一处理
- 网络错误无提示
- 404/500 无友好页面

**方案：**
```vue
<!-- ErrorBoundary.vue -->
<template>
  <div class="error-boundary">
    <slot v-if="!hasError" />
    <div v-else class="error-fallback">
      <div class="error-icon">⚠️</div>
      <h2>{{ title }}</h2>
      <p>{{ message }}</p>
      <button @click="retry">重试</button>
    </div>
  </div>
</template>
```

**验收标准：**
- [ ] API 404 显示友好提示
- [ ] 网络错误可重试
- [ ] 统一错误组件

#### 4.4 加载状态优化

**问题：**
- 只有简单 spinner
- 无骨架屏
- 加载时间长无反馈

**方案：**
```vue
<!-- LoadingSkeleton.vue -->
<template>
  <div class="skeleton">
    <div class="skeleton-line" v-for="i in lines" :key="i" />
  </div>
</template>
```

**验收标准：**
- [ ] 列表加载骨架屏
- [ ] 详情加载骨架屏
- [ ] 统一 Loading 组件

