#### 5.1 嵌套对象支持

**需求：**
```json
{
  "customer": {
    "name": "张三",
    "address": {
      "province": "广东省",
      "city": "深圳市"
    }
  }
}
```

**方案：**
- ObjectForm 递归渲染嵌套对象
- 分组显示（折叠/展开）

#### 5.2 数组内联编辑

**需求：**
- 订单明细可添加/删除
- 数组项可编辑

**方案：**
- ObjectForm 支持 array 类型字段
- 添加/删除/排序按钮

#### 5.3 条件渲染

**需求：**
```json
{
  "payment_method": { "type": "string", "enum": [...] },
  "card_number": { 
    "type": "string",
    "visible": "{{ payment_method === 'card' }}"
  }
}
```

**方案：**
- 支持 simple expression 语法
- 运行时计算可见性

#### 5.4 计算字段

**需求：**
```json
{
  "unit_price": { "type": "number" },
  "quantity": { "type": "integer" },
  "total": { 
    "type": "number",
    "computed": "{{ unit_price * quantity }}",
    "readonly": true
  }
}
```

**方案：**
- 支持 simple expression 语法
- 依赖字段变化自动重算

