# AgierBro 项目计划

**版本:** 1.0.0  
**最后更新:** 2024-03-18  
**状态:** 核心功能完成，进入完善阶段  
**核心原则:** 前端完全无知，业务含义由 Schema 定义

---

## 架构原则

### 前端不关心业务

- ❌ 不知道"订单"、"用户"、"登录"
- ❌ 不知道"认证表单"、"详情页"
- ✅ 只知道 `hasItems`/`hasTools`
- ✅ 只根据 Schema 结构渲染

### Schema 定义一切

| 概念 | 定义位置 | 前端行为 |
|-----|---------|---------|
| 字段含义 | `field.title` | 显示 title |
| 字段可见性 | `field.visible` | 隐藏/显示 |
| 数据地址 | `field._address` | 生成链接 |
| 操作行为 | `tools[]` | 渲染按钮 |
| 操作结果 | `tools.metadata` | 执行动作 |

### 结构决定渲染

```typescript
if (data.items) renderList()          // 有 items → 列表
else if (schema.tools) renderForm()   // 有 tools → 表单
else renderDetail()                   // 默认 → 详情
```

### 组件命名规则

| 正确 | 错误 | 说明 |
|-----|------|------|
| `ObjectList` | `OrderList` | 不绑定业务 |
| `.card` | `.order-card` | 样式无业务 |
| `.form-centered` | `.auth-container` | 无业务概念 |

